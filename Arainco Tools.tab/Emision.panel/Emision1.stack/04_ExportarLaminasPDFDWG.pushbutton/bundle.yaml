title: "Exporta\nLáminas"
tooltip: |
  Muestra la lista de láminas del modelo para marcar (checkbox) las que se exportan o entran en el listado.
  Buscar filtra por número, nombre o por los textos de fecha de entrega que ya aparecen en la tabla.
  Fecha de entrega: lista valores de todos los parámetros de lámina cuyo nombre contiene «FCH»; al elegir una fecha se marcan automáticamente las láminas que coinciden en cualquiera de esos parámetros.
  Opciones de formato (active al menos una): PDF en subcarpeta PDF; DWG en subcarpeta DWG (configuración «Default», vistas fusionadas en un solo archivo); Listado Excel con plantilla TemplateListado incluida en el botón, solo láminas marcadas, requiere Excel.
  Nombre de archivo por fila: edición directa en la grilla o «Nombre Personalizado» en el encabezado de la columna (receta por parámetros guardada en el proyecto).
  Carpeta de entrega: ruta completa editable; «Examinar…» propone YYYY.MM.DD_ENTREGA bajo la carpeta elegida. La exportación crea PDF y/o DWG según opciones.
  Ejecución: barras de progreso en orden DWG, PDF y listado si aplica; al terminar puede ofrecerse abrir la carpeta de salida. Una sola ventana de la herramienta a la vez.
author: José Ignacio Núñez
min_revit_ver: 2024
max_revit_ver: 2026
