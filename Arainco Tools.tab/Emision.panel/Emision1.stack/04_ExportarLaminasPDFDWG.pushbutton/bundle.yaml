tooltip:

  Exporta las laminas seleccionadas en los formatos PDF y DWG conforme
  a la seleccion.

  Crea un listado de Planos en funcion de las láminas exportadas.

  Las láminas, pueden ser seleccionadas de forma puntual o en base a
  una fecha de entrega presente en las láminas.


