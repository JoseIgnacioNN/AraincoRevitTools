title: "Vistas Usuario"
tooltip: >
  Crea un conjunto de vistas de modelado (02_TRABAJO) para el usuario seleccionado:
  plantas estructurales Cielo y Piso por nivel, plantillas de vista y tipos
  Detail / Building Section.


  Equivalente Python del botón Dynamo «Vistas Usuario» (AraincoRevitTools).
  Requiere tipos «Structural Plan (Cielo/Piso)» y plantillas maestras 02_TRABAJO
  en el proyecto.


  Funcional en Revit 2024, 2025, 2026.
author: "BIMTools"
min_revit_ver: 2024
max_revit_ver: 2026
