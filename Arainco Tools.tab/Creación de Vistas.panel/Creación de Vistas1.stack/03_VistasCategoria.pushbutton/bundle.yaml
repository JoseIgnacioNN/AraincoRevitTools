title: "Vistas por categoría"
tooltip: >
  Crea un conjunto de vistas de entregable (01_ENTREGABLE) para la categoría
  y zona seleccionadas: plantas estructurales Cielo y Piso por nivel,
  plantillas de vista y tipos Detail / Building Section.


  Equivalente Python del botón Dynamo «Vistas Categoría» (AraincoRevitTools).
  Requiere tipos «Structural Plan (Cielo/Piso)» y plantillas maestras en el
  proyecto.


  Funcional en Revit 2024, 2025, 2026.
author: "José Ignacio Núñez"
min_revit_ver: 2024
max_revit_ver: 2026
