title: "Unir\nGeom. Hormigón"
tooltip: >
  Une geometría (Join) solo entre pares de elementos cuyo material estructural sea
  hormigón (Concrete), y solo entre ejemplares presentes en la vista activa.
  Usa intersección geométrica para proponer pares; se ejecuta en un único deshacer.
author: "José Ignacio Núñez"
min_revit_ver: 2024
max_revit_ver: 2026
