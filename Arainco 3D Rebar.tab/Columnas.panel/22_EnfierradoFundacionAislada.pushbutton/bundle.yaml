title: "Fundación\nAislada"
tooltip: |
  Armadura en fundaciones aisladas: malla inferior y superior,
  barras laterales.

  Funcionamiento:

  - «Seleccionar fundación en modelo».
  - Activar inferior, superior y/o lateral.
  - Inferior / superior — diámetro y separación (mm).
  - Lateral — cantidad de barras y diámetro.
  - «Colocar armaduras»; propagar si el flujo lo indica.


author: "Jose Ignacio Nuñez"
min_revit_ver: 2024
max_revit_ver: 2026
