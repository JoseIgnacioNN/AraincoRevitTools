title: "Fundacion\nCorrida"
tooltip: |
  Armadura para zapatas de muro (Wall Foundation): barras en U transversales y
  longitudinales como conjuntos Rebar Set (Maximum Spacing), troceo y empalmes
  si el eje supera 12 m (Revit 2024+).

  Exclusión: no trocea curvas sometidas a estiramiento por empotramiento; aquí
  solo se trocea el eje recto calculado desde la geometría del elemento.
author: "Jose Ignacio Nunez"
min_revit_ver: 2024
max_revit_ver: 2026
