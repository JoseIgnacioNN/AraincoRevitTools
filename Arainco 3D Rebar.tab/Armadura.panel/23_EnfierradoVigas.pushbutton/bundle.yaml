title: "Enfierrado\nvigas"
tooltip: |
  Enfierrado de vigas (estructura): selección de Structural Framing, Structural
  Columns y Walls; parámetros por armadura superior e inferior (cantidad de barras
  y diámetro).

  El análisis de curvas y la creación de barras se incorporarán en una versión posterior.
