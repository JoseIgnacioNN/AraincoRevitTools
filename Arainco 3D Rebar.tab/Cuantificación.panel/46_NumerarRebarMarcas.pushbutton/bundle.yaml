title: "Actualizar Marcas"
tooltip: >
  Asigna marcas numéricas a Rebar y RebarInSystem de Area Reinforcement.
  Agrupa por forma, tipo, segmentos (redondeo 10 mm), ganchos y end treatments.
  Escribe en Armadura_Marca ({diámetro}{número}, ej. 815). Numeración
  incremental: conserva marcas existentes; barras nuevas se acoplan o reciben
  índice nuevo.
author: "José Ignacio Núñez"
min_revit_ver: 2024
max_revit_ver: 2026
