title: "Generar\nTablas"
tooltip: >
  Abre un formulario para seleccionar niveles (checkbox) y crear/actualizar
  cuadros de armadura: Malla/Sin Malla × Superior (F')/Inferior (F).
  Filtros: Host Category = Floor, Armadura_Nivel, Armadura_Malla y
  Armadura_Ubicacion. Usa la plantilla «Arainco Plantilla Cuantificación Losa».
author: "José Ignacio Núñez"
