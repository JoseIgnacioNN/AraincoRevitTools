title: "Borde\nLosa"
tooltip: |
  Barras en borde de losa con gancho 90° y reglas de empotramiento y anclaje
  (extensiones y cotas según el motor de enfierrado tipo shaft).

  Paquete portable: copie esta carpilla .pushbutton completa (carpeta scripts/)
  a otra extensión pyRevit.

  Funcionamiento:

  - «Seleccionar host (losa) y caras en el modelo».
  - Activar capas, cantidad y diámetro según el refuerzo requerido.
  - «Colocar armaduras»; troceo si el tramo supera 12 m.


author: "José Ignacio Núñez"
min_revit_ver: 2024
max_revit_ver: 2026
